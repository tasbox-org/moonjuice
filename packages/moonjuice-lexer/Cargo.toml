[package]
name = "moonjuice-lexer"
version = "0.1.0"
edition = "2024"
description = "Tokenise raw text into MoonJuice tokens"
license = "MIT"
repository = "https://github.com/tasbox-org/moonjuice"
readme = "../../README.md"

[dependencies]
moonjuice-common = { path = "../moonjuice-common", version = "0.1.0" }
phf = { version = "0.13.1", features = ["macros"] }

[dev-dependencies]
assertor = "*"
indoc = "2"
rstest = "0.26.1"
