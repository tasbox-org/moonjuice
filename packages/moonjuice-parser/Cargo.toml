[package]
name = "moonjuice-parser"
version = "0.2.0"
edition = "2024"
description = "Parse MoonJuice tokens into an AST"
license = "MIT"
repository = "https://github.com/tasbox-org/moonjuice"
readme = "../../README.md"
keywords = ["moonjuice", "tasbox"]
categories = ["parsing"]

[dependencies]
moonjuice-common = { path = "../moonjuice-common", version = "0.1.2" }
moonjuice-lexer = { path = "../moonjuice-lexer", version = "0.1.2" }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
indoc = "2"
insta = { version = "1.46.1", features = ["yaml"] }
