[package]
name = "moonjuice-parser"
version = "0.1.0"
edition = "2024"

[dependencies]
moonjuice-common = { path = "../moonjuice-common", version = "0.1.0" }
moonjuice-lexer = { path = "../moonjuice-lexer", version = "0.1.0" }
phf = { version = "0.13.1", features = ["macros"] }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
assertor = "*"
indoc = "2"
rstest = "0.26.1"
insta = { version = "1.46.1", features = ["yaml"] }
