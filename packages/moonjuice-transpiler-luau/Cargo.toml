[package]
name = "moonjuice-transpiler-luau"
version = "0.1.1"
edition = "2024"
description = "Transpile MoonJuice AST nodes to the Luau scripting language"
license = "MIT"
repository = "https://github.com/tasbox-org/moonjuice"
readme = "../../README.md"
keywords = ["moonjuice", "tasbox"]
categories = ["compilers"]

[dependencies]
moonjuice-common = { path = "../moonjuice-common", version = "0.1.1" }
moonjuice-lexer = { path = "../moonjuice-lexer", version = "0.1.1" }
moonjuice-parser = { path = "../moonjuice-parser", version = "0.1.1" }
uuid = { version = "1.23.1", features = ["v7"] }

[dev-dependencies]
indoc = "2"
insta = { version = "1.47.2" }
