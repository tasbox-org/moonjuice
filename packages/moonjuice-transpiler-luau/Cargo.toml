[package]
name = "moonjuice-transpiler-luau"
version = "0.1.0"
edition = "2024"

[dependencies]
moonjuice-common = { path = "../moonjuice-common", version = "0.1.0" }
moonjuice-lexer = { path = "../moonjuice-lexer", version = "0.1.0" }
moonjuice-parser = { path = "../moonjuice-parser", version = "0.1.0" }
uuid = { version = "1.23.1", features = ["v7"] }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
indoc = "2"
insta = { version = "1.46.1", features = ["yaml"] }
